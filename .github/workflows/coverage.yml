name: Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run Tests with Coverage
      run: go test -v -coverprofile coverage.out ./internal/... ./pkg/... ./cmd/... ./plugin/...

    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.out
