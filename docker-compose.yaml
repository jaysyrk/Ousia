version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ousia-local
    container_name: ousia-gateway
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9000:9000"
    environment:
      - OUSIA_ADMIN_TOKEN=pmUEyk2ilbWHO7FAsVSIBtLhnC9T8aR5Go06Nu1f
    networks:
      - ousia-mesh

  service-a:
    image: traefik/whoami
    container_name: service-a
    networks:
      - ousia-mesh

  service-a-sidecar:
    image: ousia-local
    container_name: service-a-sidecar
    depends_on:
      - service-a
      - gateway
    network_mode: "service:service-a"
    command: >
      sidecar
      -admin-url http://gateway:9000
      -service-id service-a
      -local-port 80
      -inbound-port 15000
      -outbound-port 15001
    environment:
      - OUSIA_ADMIN_TOKEN=pmUEyk2ilbWHO7FAsVSIBtLhnC9T8aR5Go06Nu1f
      - OUSIA_WASM_PATH=/app/plugin.wasm
      - OUSIA_WASM_SHA256=4e1301a203aeebc00c599d24fd5d09e8328311481f10c40fc827b5a40b37c0df

  service-b:
    image: traefik/whoami
    container_name: service-b
    networks:
      - ousia-mesh

  service-b-sidecar:
    image: ousia-local
    container_name: service-b-sidecar
    depends_on:
      - service-b
      - gateway
    network_mode: "service:service-b"
    command: >
      sidecar
      -admin-url http://gateway:9000
      -service-id service-b
      -local-port 80
      -inbound-port 15000
      -outbound-port 15001
    environment:
      - OUSIA_ADMIN_TOKEN=pmUEyk2ilbWHO7FAsVSIBtLhnC9T8aR5Go06Nu1f
      - OUSIA_WASM_PATH=/app/plugin.wasm
      - OUSIA_WASM_SHA256=4e1301a203aeebc00c599d24fd5d09e8328311481f10c40fc827b5a40b37c0df

  prometheus:
    image: prom/prometheus:latest
    container_name: ousia-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - ousia-mesh

networks:
  ousia-mesh:
    driver: bridge
